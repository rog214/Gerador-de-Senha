<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="keywords" content="Gerador de senha, gerador de senhas" />
		<title>Gerador de Senha</title>
		<link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="css/style.css" />
		<script src="js/script.js" defer></script>
	</head>
	<body>
		<div id="espaco">
			<div class="estrelas"></div>
			<div class="estrelas"></div>
			<div class="estrelas"></div>
			<div class="estrelas"></div>
		</div>
		<div id="conteiner">
			<h1>Gerador de Senha</h1>
			<span id="texto-deslizante">Deslize para escolher o tamanho de <span id="valor"></span> caracteres</span>
			<input type="range" name="" id="deslizante" min="8" max="20" value="14" />
			<div class="botoes">
				<button id="botao" onclick="gerarSenha()">Gerar Senha</button>
				<button id="botao-redefinir">
					<img src="assets/reset.svg" alt="botão reset" />
				</button>
			</div>
			<div id="conteiner-senha" onclick="copiarSenha()" class="conteiner-senha oculto">
				<h2>Sua senha gerada foi:</h2>
				<div id="campo-senha">
					<span id="senha"></span>
				</div>
				<span class="dica">⬆️ Clique na senha para copiá-la ⬆️</span>
			</div>
			<span class="desenvolvedor">Desenvolvido por <a href="https://www.linkedin.com/in/rog214/">Roger</a></span>
		</div>
	</body>
</html>
